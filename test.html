<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册API测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f5f5f5;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #40a9ff;
        }
    </style>
</head>
<body>
    <h1>注册API测试</h1>
    <button onclick="testRegister()">测试直接注册</button>
    <button onclick="testProxyRegister()">测试代理注册</button>
    <div class="result" id="result"></div>

    <script>
        async function testRegister() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '测试直接访问后端API...';
            
            try {
                const response = await fetch('http://localhost:3000/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: '测试用户',
                        phone: '13800138000',
                        password: '123456',
                        role: 'child'
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `<pre>直接访问结果：${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre>直接访问错误: ${error.message}</pre>`;
            }
        }

        async function testProxyRegister() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '测试通过Vite代理访问...';
            
            try {
                const response = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: '测试用户',
                        phone: '13800138000',
                        password: '123456',
                        role: 'child'
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `<pre>代理访问结果：${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.innerHTML = `<pre>代理访问错误: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
